<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRA LOG — Controle de Máquinas</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">T</div>
        <div>
          <div class="logo-name">TERRA LOG</div>
          <div class="logo-sub">Controle de Máquinas</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard"><span class="nav-icon">◈</span> Dashboard</a>
        <a class="nav-item" data-page="maquinas"><span class="nav-icon">⬡</span> Máquinas</a>
        <a class="nav-item" data-page="lancamentos"><span class="nav-icon">◷</span> Lançar Horas</a>
        <a class="nav-item" data-page="combustivel"><span class="nav-icon">⬨</span> Combustível</a>
        <a class="nav-item" data-page="manutencao"><span class="nav-icon">⚙</span> Manutenção</a>
        <a class="nav-item" data-page="precos"><span class="nav-icon">◎</span> Tabela de Preços</a>
        <a class="nav-item" data-page="relatorio"><span class="nav-icon">◫</span> Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <div class="clock" id="clock">--:--:--</div>
        <div class="clock-date" id="clock-date">--/--/----</div>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div id="alert-badge" class="alert-badge hidden"></div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Título</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
